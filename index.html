<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frenk Ops - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        .container {
            background: white;
            padding: 4rem 2rem;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 1rem;
            font-size: 2.5rem;
        }
        
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        
        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        a {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
            font-weight: 500;
        }
        
        a:hover {
            background: #764ba2;
        }
        
        a.secondary {
            background: #f0f0f0;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        a.secondary:hover {
            background: #667eea;
            color: white;
        }
        
        footer {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 Frenk Ops</h1>
        <p>Benvenuto nel mio spazio digitale. Qui troverai i miei progetti e esperimenti.</p>
        
        <div class="links">
            <a href="https://github.com/frenk-ops" target="_blank">GitHub</a>
            <a href="https://github.com/frenk-ops/frenk-ops.github.io" class="secondary" target="_blank">Repository</a>
        </div>
        
        <footer>
            <p>© 2026 Frenk Ops. Tutti i diritti riservati.</p>
        </footer>
    </div>
</body>
</html>
